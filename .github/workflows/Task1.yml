
name: Django CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if [ -f manage.py ]; then
            python manage.py test
          else
            echo "No manage.py found, skipping tests"
          fi

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KAD }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync app to EC2
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude "venv" \
            --exclude "__pycache__" \
            -e "ssh -i ~/.ssh/ec2_key.pem" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd ${{ secrets.EC2_APP_DIR }}

            sudo apt update
            sudo apt install -y python3-pip python3-venv

            if [ ! -d venv ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate
            pip install --upgrade pip

            if [ -f requirements.txt ]; then
              pip install -r requirements.txt
            fi

            python3 manage.py migrate
            python3 manage.py collectstatic --noinput || true

            # Optional: restart app service if you have one configured
            # sudo systemctl restart gunicorn
          EOF
          
